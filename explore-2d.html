<script>

/* ============================================================================
   General dual-economy 2-D explorer. Builds legacy shapes from bundles.
     DATA  = {nodes:[{c,t,s,x,y,dom,typ}], comp:{code:[codes]}}
     PAIRS = {code:{c:[[code,gemini,glove]...], s:[[code,gemini,glove]...]}}
     ECO   = {m:{code:cid}, lab:{cid:label}, n:{cid:size}, order:[cid...]}
     ECOC  = {cid:color}    N = DATA.nodes    comp = DATA.comp
   ========================================================================== */
let DATA=null, PAIRS=null, ECO=null, ECOC=null, N=null, comp=null, byCode={};
const COLORS=["#7F77DD","#1D9E75","#D85A30","#D4537E","#378ADD","#639922","#EF9F27","#E24B4A"];
const ECO_PALETTE=["#5DCAA5","#8b84ec","#F0997B","#46b3e6","#e8b84f","#d4537e","#b58e5a","#58c941","#ff9f5a","#e87fd0","#4fd0c0","#e85b5b","#aab33c","#d8e84a","#f4a4c0","#7fd49a","#c79ae8","#e0c060"];
const DOMAIN_COL={consumer_final:'#5DCAA5', non_consumer:'#F0997B', REVIEW:'#46b3e6'};
const SEC_INFO={"1":{n:"Agriculture, mining & utilities",c:"#7F77DD"},"2":{n:"Processed foods, textiles, wood & paper",c:"#1D9E75"},"3":{n:"Chemicals, plastics, minerals",c:"#D85A30"},"4":{n:"Metals, machinery, equipment & vehicles",c:"#D4537E"},"5":{n:"Transportation, postal & warehousing",c:"#378ADD"},"6":{n:"Construction, real estate & prof. services",c:"#639922"},"7":{n:"Business, education, health & personal svcs",c:"#EF9F27"},"8":{n:"Government & misc. services",c:"#E24B4A"},"9":{n:"Other / residual",c:"#8FD17A"},"10":{n:"Agriculture, mining & extraction goods",c:"#7F77DD"},"20":{n:"Manufactured goods",c:"#1D9E75"},"30":{n:"Construction & buildings",c:"#D85A30"},"40":{n:"Wholesale trade services",c:"#D4537E"},"50":{n:"Retail trade services",c:"#378ADD"},"60":{n:"Utilities & energy services",c:"#639922"},"70":{n:"Business, personal & other services",c:"#EF9F27"},"80":{n:"Finance, insurance & government services",c:"#E24B4A"},"90":{n:"Other / residual",c:"#8FD17A"}};

let THEME=null;
function cssv(name){return getComputedStyle(document.documentElement).getPropertyValue(name).trim();}
function rebuildTheme(){
  const light=document.documentElement.classList.contains('light');
  const bg=cssv('--bg')||(light?'#f7f8fa':'#101014');
  const card=cssv('--card')||(light?'#ffffff':'#191b22');
  const line=cssv('--line')||(light?'#dfe3e8':'#2a2c36');
  const fg=cssv('--fg')||(light?'#1a1d21':'#e8e9ee');
  const mut=cssv('--mut')||(light?'#5a6068':'#9aa0ad');
  THEME={bg:bg, dimNode:mut, graphless:light?'#c6cad4':'#3a3c46',
    hullFill:light?0.10:0.07, hullStroke:light?0.55:0.38,
    selLabel:fg, compLabel:light?'#177a55':'#9fe1cb', subLabel:light?'#b25433':'#f5c4b3',
    ego:{bg:bg, ring:line, faint:mut, title:fg, sub:mut, center:fg,
         compTxt:light?'#177a55':'#9fe1cb', subTxt:light?'#b25433':'#f5c4b3'}};
}
rebuildTheme();

const cvwrap=document.getElementById('cvwrap');
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let W,H,scale,ox,oy,sel=null,hov=null;
let colorMode='sec', view=null, HULLS=[], exPick='', pairFocus=null;

function fit(refit){
  const r=cvwrap.getBoundingClientRect();
  W=r.width; H=r.height;
  cv.width=W*devicePixelRatio; cv.height=H*devicePixelRatio;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  if(refit||!scale){scale=Math.min(W,H)*0.86;ox=(W-scale)/2;oy=(H-scale)/2;}
  if(N)draw();
}
function sx(n){return n.x*scale+ox} function sy(n){return (1-n.y)*scale+oy}

function nodeCol(n){
  if(colorMode==='eco'){const k=ECO.m[n.c];return k===undefined?THEME.graphless:(ECOC[k]||THEME.graphless);}
  if(colorMode==='dom'){return DOMAIN_COL[n.dom]||THEME.graphless;}
  if(colorMode==='typ'){return n.typ==='service'?'#F0997B':(n.typ==='product'?'#5DCAA5':'#46b3e6');}
  return (SEC_INFO[String(n.s)]||{}).c||THEME.graphless;
}
function hexA(h,a){h=h||'#888888';return 'rgba('+parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16)+','+a+')';}
function hullOf(pts){pts=pts.slice().sort((p,q)=>p[0]-q[0]||p[1]-q[1]);const X=(O,A,B)=>(A[0]-O[0])*(B[1]-O[1])-(A[1]-O[1])*(B[0]-O[0]);const lo=[];for(const p of pts){while(lo.length>=2&&X(lo[lo.length-2],lo[lo.length-1],p)<=0)lo.pop();lo.push(p);}const up=[];for(let i=pts.length-1;i>=0;i--){const p=pts[i];while(up.length>=2&&X(up[up.length-2],up[up.length-1],p)<=0)up.pop();up.push(p);}lo.pop();up.pop();return lo.concat(up);}
function buildHulls(){
  const g={};N.forEach(n=>{const k=ECO.m[n.c];if(k===undefined)return;(g[k]=g[k]||[]).push(n);});
  const out=[];for(const k in g){const P=g[k];if(P.length<5)continue;
    const xs=P.map(p=>p.x).sort((a,b)=>a-b),ys=P.map(p=>p.y).sort((a,b)=>a-b);
    const mx=xs[xs.length>>1],my=ys[ys.length>>1];
    const D=P.map(p=>({p:p,d:(p.x-mx)*(p.x-mx)+(p.y-my)*(p.y-my)})).sort((a,b)=>a.d-b.d);
    const keep=D.slice(0,Math.max(3,Math.ceil(D.length*0.9))).map(o=>o.p);
    const h=hullOf(keep.map(p=>[p.x,p.y]));
    if(h.length>=3)out.push({k:k,h:h});}
  HULLS=out;
}

function draw(){
  if(!N){return;}
  ctx.fillStyle=THEME.bg;ctx.fillRect(0,0,W,H);
  if(colorMode==='eco'){ctx.lineWidth=1;for(const o of HULLS){ctx.beginPath();o.h.forEach((p,i)=>{const Xp=p[0]*scale+ox,Yp=(1-p[1])*scale+oy;i?ctx.lineTo(Xp,Yp):ctx.moveTo(Xp,Yp);});ctx.closePath();ctx.fillStyle=hexA(ECOC[o.k],THEME.hullFill);ctx.fill();ctx.strokeStyle=hexA(ECOC[o.k],THEME.hullStroke);ctx.stroke();}}
  const dim=!!sel||!!view, subs=(sel&&PAIRS[sel.c])?(PAIRS[sel.c].s||[]).map(it=>byCode[it[0]]).filter(Boolean):[], cps=sel?(comp[sel.c]||[]).map(c=>byCode[c]).filter(Boolean):[];
  if(view){ctx.lineWidth=view.kind==='pair'?1.8:0.8;
    ctx.strokeStyle=view.kind==='pair'?'rgba(93,202,165,.92)':hexA(view.color,0.4);
    for(const e of view.edges){const va=byCode[e[0]],vb=byCode[e[1]];if(!va||!vb)continue;
      ctx.beginPath();ctx.moveTo(sx(va),sy(va));ctx.lineTo(sx(vb),sy(vb));ctx.stroke();}}
  if(sel){ctx.lineWidth=pairFocus?1.7:1.1;
    cps.forEach(m=>{if(pairFocus&&m.c!==pairFocus)return;ctx.strokeStyle='rgba(93,202,165,'+(pairFocus?'.95':'.75')+')';ctx.beginPath();ctx.moveTo(sx(sel),sy(sel));ctx.lineTo(sx(m),sy(m));ctx.stroke();});
    subs.forEach(m=>{if(pairFocus&&m.c!==pairFocus)return;ctx.strokeStyle='rgba(240,153,123,'+(pairFocus?'.95':'.75')+')';ctx.beginPath();ctx.moveTo(sx(sel),sy(sel));ctx.lineTo(sx(m),sy(m));ctx.stroke();});}
  const actC=new Set(cps.map(m=>m.c)), actS=new Set(subs.map(m=>m.c));
  for(const n of N){let r=(sel&&n===sel)?6:1.7,al=dim?0.32:0.85,col=nodeCol(n);
    if(view){const inV=view.set.has(n.c);
      if(inV){al=0.95;r=view.kind==='pair'?6.5:2.6;col=view.kind==='pair'?'#e8b84f':view.color;}
      else{al=0.38;r=1.7;col=THEME.dimNode;}}
    else if(sel){
      if(pairFocus){
        if(n===sel||n.c===pairFocus){al=0.97;}
        else if(actC.has(n.c)){col=hexA('#5DCAA5',.5);al=0.72;r=2.4;}
        else if(actS.has(n.c)){col=hexA('#F0997B',.5);al=0.72;r=2.4;}
        else{col=THEME.dimNode;al=0.2;}
      } else {const act=(n===sel)||actC.has(n.c)||actS.has(n.c);
        if(act){al=0.97;}else{col=THEME.dimNode;al=0.26;}}}
    if(sel&&n===sel){r=6;al=1;}
    ctx.globalAlpha=al;ctx.fillStyle=col;
    ctx.beginPath();ctx.arc(sx(n),sy(n),r,0,7);ctx.fill();}
  ctx.globalAlpha=1;
  if(view&&view.kind==='pair'){ctx.fillStyle=THEME.selLabel;ctx.font='13px system-ui';
    ctx.fillText(view.A.t,sx(view.A)+10,sy(view.A)-9);
    ctx.fillText(view.B.t,sx(view.B)+10,sy(view.B)-9);}
  if(sel){const mark=(m,col,r)=>{ctx.fillStyle=col;ctx.beginPath();ctx.arc(sx(m),sy(m),r,0,7);ctx.fill();};
    if(pairFocus){const pn=byCode[pairFocus];if(pn)mark(pn,actC.has(pairFocus)?'#5DCAA5':'#F0997B',5.5);mark(sel,THEME.selLabel,6.5);
      ctx.fillStyle=THEME.selLabel;ctx.font='13px system-ui';ctx.fillText(sel.t,sx(sel)+9,sy(sel)-9);
      if(pn){ctx.font='12px system-ui';ctx.fillStyle=actC.has(pairFocus)?THEME.compLabel:THEME.subLabel;ctx.fillText(pn.t.length>42?pn.t.slice(0,41)+'…':pn.t,sx(pn)+8,sy(pn)-7);}}
    else{cps.forEach(m=>mark(m,'#5DCAA5',4));subs.forEach(m=>mark(m,'#F0997B',4));mark(sel,THEME.selLabel,6.5);
      ctx.fillStyle=THEME.selLabel;ctx.font='13px system-ui';ctx.fillText(sel.t,sx(sel)+9,sy(sel)-9);
      ctx.font='11.5px system-ui';
      cps.forEach(m=>{ctx.fillStyle=THEME.compLabel;ctx.fillText(m.t.length>38?m.t.slice(0,37)+'…':m.t,sx(m)+6,sy(m)-5);});
      subs.forEach(m=>{ctx.fillStyle=THEME.subLabel;ctx.fillText(m.t.length>38?m.t.slice(0,37)+'…':m.t,sx(m)+6,sy(m)+11);});}}
}

let drag=null;
cv.onmousedown=e=>drag={x:e.clientX,y:e.clientY,ox,oy};
window.onmousemove=e=>{if(!N)return;
  const r=cvwrap.getBoundingClientRect(), lx=e.clientX-r.left, ly=e.clientY-r.top;
  if(drag){ox=drag.ox+e.clientX-drag.x;oy=drag.oy+e.clientY-drag.y;draw();return;}
  if(lx<0||ly<0||lx>W||ly>H){document.getElementById('tip').style.display='none';return;}
  let best=null,bd=12*12;for(const n of N){const dx=sx(n)-lx,dy=sy(n)-ly,d=dx*dx+dy*dy;if(d<bd){bd=d;best=n;}}
  const tip=document.getElementById('tip');
  if(best){tip.style.display='block';tip.style.left=(e.clientX+13)+'px';tip.style.top=(e.clientY+13)+'px';tip.innerHTML='<b>'+best.t+'</b><br><span style="color:var(--mut)">'+best.c+' · section '+best.s+(ECO.m[best.c]!==undefined?' · '+ECO.lab[ECO.m[best.c]]:'')+'</span>';}
  else tip.style.display='none';};
window.onmouseup=()=>drag=null;
cv.onwheel=e=>{e.preventDefault();const r=cvwrap.getBoundingClientRect(),lx=e.clientX-r.left,ly=e.clientY-r.top;const f=e.deltaY<0?1.15:0.87;ox=lx-(lx-ox)*f;oy=ly-(ly-oy)*f;scale*=f;draw();};
cv.onclick=e=>{if(drag&&(Math.abs(e.clientX-drag.x)>3))return;const r=cvwrap.getBoundingClientRect(),lx=e.clientX-r.left,ly=e.clientY-r.top;let best=null,bd=12*12;for(const n of N){const dx=sx(n)-lx,dy=sy(n)-ly,d=dx*dx+dy*dy;if(d<bd){bd=d;best=n;}}if(best){if(view)clearView2();setSel(best);draw();return;}if(sel||view){restoreSel();}};
function embIdx2(){return ({gemini:1,glove:2,tfidf:3,openai:4})[CV2.get('rep')]||1;}
function embName2(){return ({gemini:'Gemini',glove:'GloVe',tfidf:'TF-IDF',openai:'OpenAI'})[CV2.get('rep')]||'Gemini';}
function genName2(){return ({"gpt-4o":"GPT-4o","gemini-2.5-pro":"Gemini","consensus":"Consensus"})[CV2.get('generator')]||"GPT-4o";}
function catn(n){return n+(n===1?' category':' categories');}
function escp(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function renderPanel(){
 const pn=document.getElementById('panel'); if(!pn)return;
 if(!sel||!PAIRS[sel.c]){pn.style.display='none';return;}
 const e=PAIRS[sel.c], mi=embIdx2(), nm=c=>byCode[c]?byCode[c].t:c;
 pn.style.display='flex';
 const row=(it,cls)=>{const act=(pairFocus===it[0]);const bg=act?(cls==='cc'?'rgba(29,158,117,.20)':'rgba(216,90,48,.20)'):'';return '<div class="prow '+cls+'" data-c="'+it[0]+'" title="Focus this pair" style="display:flex;justify-content:space-between;gap:8px;cursor:pointer;border-radius:5px;padding:1px 5px;margin:0 -5px'+(bg?(';background:'+bg):'')+'"><span>• '+escp(nm(it[0]))+'</span><span style="color:var(--mut);font-variant-numeric:tabular-nums">'+(it[mi]!=null?(+it[mi]).toFixed(3):'—')+'</span></div>';};
 pn.innerHTML='<button id="pairback" title="Show all complements & substitutes">⟲</button>'
  +'<div class="phead">'
   +'<h3>'+escp(sel.t)+'</h3>'
   +'<div style="color:var(--mut);font-size:12px">'+sel.c+' · section '+sel.s+'</div>'
   +'<div style="margin-top:5px;font-size:11px;color:var(--mut)">cosine in <b>'+embName2()+'</b> space</div>'

function fitToFocal(){
  if(!sel)return;
  const ids=[sel.c].concat(comp[sel.c]||[], ((PAIRS[sel.c]&&PAIRS[sel.c].s)||[]).map(it=>it[0]));
  const pts=ids.map(c=>byCode[c]).filter(Boolean); if(!pts.length)return;
  let mnx=1,mxx=0,mny=1,mxy=0;
  pts.forEach(p=>{if(p.x<mnx)mnx=p.x;if(p.x>mxx)mxx=p.x;if(p.y<mny)mny=p.y;if(p.y>mxy)mxy=p.y;});
  let cx,cy,halfW,halfH; const base=Math.min(W,H);
  if(pairFocus&&byCode[pairFocus]&&byCode[sel.c]){
    // Pair-focus: zoom in ON the focal–pair (it should be the most visible thing),
    // then widen only enough to keep the nearest ~third of the other members as
    // faded context — capped so the pair always stays prominent (mirrors 3-D).
    const a=byCode[sel.c], b=byCode[pairFocus];
    cx=(a.x+b.x)/2; cy=(a.y+b.y)/2;
    const phe=Math.max(0.5*Math.hypot(a.x-b.x,a.y-b.y), 0.006);   // euclidean half-length
    const pairWin=phe*1.33;                      // pair spans ~50% of the canvas
    const others=ids.filter(c=>c!==sel.c&&c!==pairFocus).map(c=>byCode[c]).filter(Boolean)
      .map(p=>Math.hypot(p.x-cx,p.y-cy)).sort((m,n)=>m-n);
    const rCtx=others.length?others[Math.floor((others.length-1)*0.34)]:pairWin;
    const win=Math.max(0.008, pairWin, Math.min(rCtx, pairWin*1.3));   // context capped: pair stays ~42-50%
    halfW=win; halfH=win;
  } else {
    cx=(mnx+mxx)/2; cy=(mny+mxy)/2;
    halfW=Math.max(mxx-cx,cx-mnx,0.012); halfH=Math.max(mxy-cy,cy-mny,0.012);
  }
  let s=Math.min(W/(halfW*2*1.5), H/(halfH*2*1.5));
  s=Math.max(base*0.55, Math.min(s, base*6.0));
  scale=s; ox=W/2-cx*scale; oy=H/2-(1-cy)*scale;
}

function ecoInternalEdges(k){
  const seen=new Set(),out=[];
  for(const a in comp){
    if(ECO.m[a]!==k||!byCode[a])continue;
    for(const b of comp[a]){
      if(ECO.m[b]!==k||!byCode[b])continue;
      const key=a<b?a+'|'+b:b+'|'+a;
      if(!seen.has(key)){seen.add(key);out.push([a,b]);}

function applyHash(){
  if(!N)return;
  const h=decodeURIComponent((location.hash||'').slice(1));
  const had=!!view; view=null; let m;
  if((m=h.match(/^focal=(\d{7})$/))){ focusCode(m[1]); hideBanner(); renderLegend(); draw(); return; }
  if((m=h.match(/^eco=(\d+)$/))){
    const k=+m[1], members=N.filter(n=>ECO.m[n.c]===k);
    if(members.length){
      view={kind:'eco',k:k,color:ECOC[k]||'#5DCAA5',set:new Set(members.map(n=>n.c)),edges:ecoInternalEdges(k)};
      if(colorMode!=='eco')setColorMode('eco');
      let x0=1e9,x1=-1e9,y0=1e9,y1=-1e9;
      members.forEach(n=>{const yy=1-n.y;if(n.x<x0)x0=n.x;if(n.x>x1)x1=n.x;if(yy<y0)y0=yy;if(yy>y1)y1=yy;});
      const bw=Math.max(x1-x0,0.02),bh=Math.max(y1-y0,0.02);
      scale=Math.min((W*0.78)/bw,(H*0.66)/bh);
      ox=W/2-((x0+x1)/2)*scale; oy=H/2+20-((y0+y1)/2)*scale;
      showBanner('Ecosystem: <b>'+esc(ECO.lab[k]||('community '+k))+'</b> &mdash; '+members.length+' categories, '+view.edges.length+' internal complement links');
    }
  } else if((m=h.match(/^pair=(\d{7}),(\d{7})$/))){
    const A=byCode[m[1]],B=byCode[m[2]];
    if(A&&B){
      const edges=[];
      if((comp[A.c]||[]).includes(B.c)||(comp[B.c]||[]).includes(A.c))edges.push([A.c,B.c]);
      view={kind:'pair',A:A,B:B,set:new Set([A.c,B.c]),edges:edges};
      const mx=(A.x+B.x)/2,my=((1-A.y)+(1-B.y))/2;
      const d=Math.max(Math.hypot(A.x-B.x,A.y-B.y),0.01);
      scale=Math.min(Math.max(W,H)*4,(Math.min(W,H)*0.5)/d);
      ox=W/2-mx*scale; oy=H/2-my*scale;
      showBanner('<b>'+esc(A.t)+'</b> &#8644; <b>'+esc(B.t)+'</b> &mdash; mutual complements');
    }
  }
  if(!view){hideBanner();if(had){scale=Math.min(W,H)*0.86;ox=(W-scale)/2;oy=(H-scale)/2;}}
  renderLegend();
  draw();
}

    CV2.data('pairs',country),    CV2.data('graph',country)
  ]);
  const coords=r[0], meta=r[1], pairs=r[2], graph=r[3];
  let x0=1e9,x1=-1e9,y0=1e9,y1=-1e9;
  for(const c in coords){const p=coords[c];if(p[0]<x0)x0=p[0];if(p[0]>x1)x1=p[0];if(p[1]<y0)y0=p[1];if(p[1]>y1)y1=p[1];}
  const dx=(x1-x0)||1, dy=(y1-y0)||1, sp=Math.max(dx,dy);
  const padx=(sp-dx)/2, pady=(sp-dy)/2;
  const nodes=[];
  for(const c in coords){
    const md=meta[c]||{}; const p=coords[c];
    const s=parseInt(md.section||'1',10)||1;
    const th=md.type_hint||'';
    const typ=/service/.test(th)?'service':(/good|material|equipment|component|construction|housing|wholesale|finance/.test(th)?'product':'other');
    nodes.push({c:c, t:md.title||c, s:s,
      x:(p[0]-x0+padx)/sp, y:(p[1]-y0+pady)/sp,
      dom:md.domain||'non_consumer', typ:typ});
  }
  const PAIRS_={}, comp_={};
  for(const focal in pairs){
    const entry=pairs[focal];
    const cps=pickComplements(entry);
    const subs=entry.substitutes||[];
    PAIRS_[focal]={
      c:cps.map(o=>[o.code].concat(cosPair(o.cos))),
      s:subs.map(o=>[o.code].concat(cosPair(o.cos)))
    };
    comp_[focal]=cps.map(o=>o.code);
  }
  const ECO_={m:{}, lab:{}, n:{}, order:[]};
  const nc=graph.node_community||{};
  for(const c in nc)ECO_.m[c]=nc[c];
  const comms=(graph.communities||[]).slice();
  comms.forEach(cm=>{ ECO_.lab[cm.id]=communityLabel(cm);
    ECO_.n[cm.id]=cm.size!=null?cm.size:(cm.members?cm.members.length:0); });
  comms.sort((a,b)=>(ECO_.n[b.id]||0)-(ECO_.n[a.id]||0));
  ECO_.order=comms.map(cm=>cm.id);
  const ECOC_={}; ECO_.order.forEach((id,i)=>{ECOC_[id]=ECO_PALETTE[i%ECO_PALETTE.length];});
  return {nodes:nodes, comp:comp_, PAIRS:PAIRS_, ECO:ECO_, ECOC:ECOC_};
}
function communityLabel(cm){
  if(cm.theme){const p=cm.theme.split('—');let nm=p[0].split(' - ')[0].trim();let ex=p[1]?p[1].replace(/^\s*e\.g\.\s*/,'').split(',')[0].trim():'';let t=ex?nm+' · '+ex:nm;
    if(t.length>50)t=t.slice(0,49)+'…'; return t;}
  if(cm.top_sections&&cm.top_sections.length)return 'Sections '+cm.top_sections.slice(0,2).map(s=>s[0]).join('/');
  return 'community '+cm.id;
}

let loading=false;
async function loadCountry(country, keepFocalCode){
  loading=true;
  const notice=document.getElementById('notice');
  notice.style.display='block'; notice.textContent='Loading '+(country==='US'?'United States':'Canada')+' map…';
  try{
    const built=await buildData(country);
    DATA={nodes:built.nodes, comp:built.comp};
    PAIRS=built.PAIRS; ECO=built.ECO; ECOC=built.ECOC;
    N=DATA.nodes; comp=DATA.comp;
    byCode={}; N.forEach(n=>byCode[n.c]=n);
    buildHulls();
    notice.style.display='none';
    sel=(keepFocalCode&&byCode[keepFocalCode])?byCode[keepFocalCode]:null;
    if(sel){q.value=sel.t;CV2.setControlActive('generator',true);CV2.setControlActive('embedding',true);}
    else{q.value='';CV2.setControlActive('generator',false);CV2.setControlActive('embedding',false);}
    renderPanel();
    fit(true);
    renderQuick();
    renderLegend();
    if(location.hash)applyHash(); else draw();
    var _cv=document.getElementById('cv'); if(_cv)_cv.style.opacity='1';
    if(window._exFocus){const ec=window._exFocus;window._exFocus=null;if(byCode[ec])focusCode(ec);}
  }catch(err){
    notice.style.display='block';
    notice.innerHTML='<b>Could not load '+(country==='US'?'United States':'Canada')+' data.</b><br><span style="color:var(--mut);font-size:13px">'+esc(String(err&&err.message||err))+'</span>';
    N=null;
  }
  loading=false;
}

function moveToolsToHeader(){
  const ct=document.getElementById('ctools'); if(!ct)return;
  ['q','snap','egobtn','quick'].forEach(id=>{const el=document.getElementById(id); if(el&&el.parentNode!==ct)ct.appendChild(el);});
  const qb=document.getElementById('qbar'); if(qb)qb.style.display='none';
}
window.addEventListener('cv2:ready',()=>{ setHdrOffset(); rebuildTheme(); injectColorBy(); moveToolsToHeader(); mountRail(); fit(true); loadCountry(CV2.get('country')); setTimeout(function(){var _cv=document.getElementById('cv'); if(_cv&&_cv.style.opacity!=='1')_cv.style.opacity='1';},2500); });
window.addEventListener('cv2:change',e=>{
  const k=e.detail.key;
  if(k==='theme'){ rebuildTheme(); renderLegend(); draw(); if(egoEl.style.display==='flex')renderEgo(); return; }
  if(k==='country'){ const keep=sel?sel.c:null; loadCountry(e.detail.value, keep); return; }
  if(k==='generator'){ const keep=sel?sel.c:null; loadCountry(CV2.get('country'), keep); return; }
  if(k==='rep'){ renderPanel(); if(egoEl.style.display==='flex')renderEgo(); return; }
});
window.addEventListener('resize',()=>{ setHdrOffset(); fit(false); });
</script></body></html>
